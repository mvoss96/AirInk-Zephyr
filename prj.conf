# Build the app as C++
CONFIG_CPP=y
CONFIG_STD_CPP17=y

# GPIO for LED (P0.15) and button (P0.11)
CONFIG_GPIO=y

# SCD40 CO2 sensor on I2C0 (SCL P0.22 / SDA P0.24)
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_SCD4X=y

# External 3V3 LDO / load-switch on P0.13, kept on via regulator-boot-on
CONFIG_REGULATOR=y
CONFIG_REGULATOR_FIXED=y

# --- E-Paper display: GDEY042T81 4.2" (SSD1683, vendored ssd16xx driver) ---
CONFIG_SPI=y
CONFIG_MIPI_DBI=y
CONFIG_DISPLAY=y
# In-tree ssd16xx caps the panel at 296x176; use the vendored copy in
# src/drivers/ (ssd1680 quirk raised to 400x400) instead.
CONFIG_SSD16XX=n

# --- LVGL (1-bit, on-demand rendering from main) ---
CONFIG_LVGL=y
CONFIG_LV_COLOR_DEPTH_1=y
CONFIG_LV_Z_BITS_PER_PIXEL=1
CONFIG_LV_Z_COLOR_MONO_HW_INVERSION=y
# SSD16xx only does full-panel refresh; render the whole framebuffer each flush.
CONFIG_LV_Z_FULL_REFRESH=y
CONFIG_LV_Z_VDB_SIZE=100
CONFIG_LV_Z_MEM_POOL_SIZE=16384
CONFIG_LV_Z_AUTO_INIT=y
# We drive lv_timer_handler() ourselves from main, so no LVGL workqueue runner.
CONFIG_LV_Z_RUN_LVGL_ON_WORKQUEUE=n
# Fonts: the UI uses custom B612 (text) + DSEG7 (values) from src/fonts/, so no
# Montserrat is needed. LVGL still requires a built-in default font (used only if
# a widget has no explicit font set - never happens here); pick the tiny UNSCII-8
# placeholder so Montserrat is fully out of the build.
CONFIG_LV_FONT_DEFAULT_UNSCII_8=y
# LVGL enables Montserrat-14 by default; force it off (nothing references it).
CONFIG_LV_FONT_MONTSERRAT_14=n

CONFIG_HEAP_MEM_POOL_SIZE=49152
# 400x300 mono render + Montserrat-48 rasterization needs a roomy stack.
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

# Console over USB CDC ACM (serial) is already enabled by the
# promicro_nrf52840 board defconfig, so printk() goes to USB serial.

# Produce a .uf2 for the Adafruit nRF52 bootloader these SuperMini clones ship
# with. Build for the PLAIN target (promicro_nrf52840/nrf52840), NOT the /uf2
# variant: the plain target links the app at 0x1000 (right after the MBR),
# which is where this bootloader expects a SoftDevice-less app. The /uf2
# variant links at 0x26000 (SoftDevice layout) and will not boot here.
CONFIG_BUILD_OUTPUT_UF2=y
CONFIG_BUILD_OUTPUT_UF2_FAMILY_ID="0xada52840"
