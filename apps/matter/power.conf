# The measurement build. Same firmware, no voice.
#
#   west build -b promicro_nrf52840/nrf52840 apps/matter -- -Dmatter_AIRINK_POWER=y
#
# You cannot measure this device while it is talking. A live console UARTE holds the HFCLK on, and
# that alone is ~1 mA against a ~60 uA idle floor -- so a measurement of the normal build is mostly
# a measurement of the log, and the radio it was supposed to weigh disappears into the noise. The
# Matter build is the loud one: CHIP logs every message it sends.
#
# Turning the logging subsystem off is also what hands the console back to app.cpp, which then
# powers the UART down while it sleeps (see the #ifndef CONFIG_LOG there) -- the same trick the
# standalone firmware has always used, and the reason its idle floor is 60 uA rather than 1 mA.
#
# What you give up: everything it would have told you. Flash it, measure it, flash the normal one
# back.
#
# CONSOLE/UART_CONSOLE/SERIAL deliberately stay ON. The UART device has to exist for app.cpp to
# suspend it and for the devicetree's zephyr,console node to resolve -- it is instantiated and then
# put to sleep, which is precisely the point. With nothing left to write to it, that costs nothing.

CONFIG_LOG=n
CONFIG_PRINTK=n
