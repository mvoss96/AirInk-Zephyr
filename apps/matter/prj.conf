# Enable CHIP
CONFIG_CHIP=y
CONFIG_CHIP_PROJECT_CONFIG="src/chip_project_config.h"

# Configure ZAP file name
CONFIG_NCS_SAMPLE_MATTER_ZAP_FILE_PATH="${APPLICATION_CONFIG_DIR}/src/default_zap/airink.zap"

# Device identity -- what a controller shows in its UI (Basic Information cluster). Left
# unset, every one of these falls back to a sample/test default: product name
# "Matter Temperature Sensor", hardware version "prerelease", serial "11223344556677889900".
# The serial is the same on every board we flash; per-device serials would need factory
# data, which we deliberately dropped (see CHIP_FACTORY_DATA_NONE below).
CONFIG_CHIP_DEVICE_VENDOR_NAME="AirInk"
CONFIG_CHIP_DEVICE_PRODUCT_NAME="AirInk CO2 Monitor"
CONFIG_CHIP_DEVICE_HARDWARE_VERSION=1
CONFIG_CHIP_DEVICE_HARDWARE_VERSION_STRING="rev A"
CONFIG_CHIP_DEVICE_SERIAL_NUMBER="AIRINK-0001"
# The software version comes from the VERSION file (the Kconfig is hidden once APPVERSION
# is set), not from here.

# Based on https://github.com/project-chip/connectedhomeip/blob/482e6fd03196a6de45465a90003947ef4b86e0b1/docs/examples/discussion/PID_allocation_for_example_apps.md)
# 0x8000 (32768), to match the example provider's DAC (FFF1-8000). Was 32781 (0x800D).
CONFIG_CHIP_DEVICE_PRODUCT_ID=32768
CONFIG_STD_CPP17=y

# Enable Matter pairing automatically on application start.
CONFIG_CHIP_ENABLE_PAIRING_AUTOSTART=y

# Enable Matter extended announcement and increase duration to 1 hour.
CONFIG_CHIP_BLE_EXT_ADVERTISING=y
CONFIG_CHIP_BLE_ADVERTISING_DURATION=60

# The DK library drives the buttons and LEDs of a Nordic development kit. We have neither: one
# button, no status LEDs, and that button already belongs to Zephyr's gpio-keys + input-longpress
# drivers (src/input/button.cpp). Two owners on one pin is not a style question -- the DK library
# takes raw GPIO callbacks and *disables the pin interrupt* while it debounces, which is the same
# interrupt gpio-keys is using. Off. Nrf::Board and the LED widgets are wholly #ifdef'd on this,
# so they degrade to no-ops (and the sample's "LED index out of the range" boot error goes away).
CONFIG_DK_LIBRARY=n

# Bluetooth Low Energy configuration. This name is the only one actually on the air during
# BLE commissioning -- the Matter commissionable payload carries no device name (see
# CHIP_DEVICE_CONFIG_ENABLE_COMMISSIONABLE_DEVICE_NAME in chip_project_config.h), which is
# why a controller shows a generic "Matter Accessory" until it can read Basic Information.
CONFIG_BT_DEVICE_NAME="AirInk"
CONFIG_BT_DEVICE_NAME_MAX=18

# Suspend devices when the CPU goes into sleep
CONFIG_PM_DEVICE=y

# Other settings
CONFIG_THREAD_NAME=y
CONFIG_MPU_STACK_GUARD=y
CONFIG_RESET_ON_FATAL_ERROR=n
# Shell off for the bring-up (saves flash; RAM barely).
CONFIG_CHIP_LIB_SHELL=n

# Reduce application size
CONFIG_USE_SEGGER_RTT=n

# Built-in example attestation provider: it ships a complete, self-consistent set --
# DAC (FFF1/8000), PAI (FFF1), and a CD (kCdForAllExamples, covering PID 0x8000..) -- all
# hardcoded, no factory-data partition, no chip-cert host tool needed. The device's PID
# must be 0x8000 to match the example DAC (set below); the CD covers it. With HA's
# enable_test_net_dcl=true the test certs are trusted. Passcode stays custom (below).
CONFIG_CHIP_FACTORY_DATA_NONE=y
CONFIG_CHIP_DEVICE_SPAKE2_PASSCODE=528722
# The SPAKE2+ verifier is a STATIC Kconfig default -- it is NOT recomputed when the
# passcode changes. Its default belongs to passcode 20202021, so a custom passcode with
# the stock verifier makes the device advertise 528722 while proving knowledge of
# 20202021: the commissioner's Pake2 check fails and it drops BLE mid-PASE.
# Generated for passcode 528722 / this salt / 1000 iterations with
#   scripts/tools/spake2p/spake2p.py gen-verifier -p 528722 -s <salt> -i 1000
CONFIG_CHIP_DEVICE_SPAKE2_TEST_VERIFIER="LdCcPszn0rvDj59TPG1d2kQstzG8hR1Ty0PvpWUYgeUEPahM+o4wma7TlCWuMm8Z4blyJEp/VQdDBcCTW8c3JbFoMFvieDwXAbMtL/i3GSFf/d42EjivkDMMpDw2K9Fohg=="

# (OTA requestor is turned off at the sysbuild layer: SB_CONFIG_MATTER_OTA=n. It's
# injected via .config.sysbuild, which is merged AFTER prj.conf, so a prj.conf override
# here would be ignored -- the switch has to live in sysbuild.conf.)

# Matter has its own bootloader choice, separate from the sysbuild one, defaulting to
# CHIP_BOOTLOADER_MCUBOOT which hard-selects IMG_MANAGER (whose STREAM_FLASH dependency
# is now off). Pick NONE -- we have no MCUboot.
CONFIG_CHIP_BOOTLOADER_NONE=y

# NFC onboarding pulls in the NFC T2T nrfxlib, but the promicro board doesn't enable the
# nrfx NFCT driver (the DK does) -> undefined nrfx_nfct_* at link. We commission over BLE
# with the QR / manual code, so drop NFC onboarding.
CONFIG_CHIP_NFC_ONBOARDING_PAYLOAD=n

# The board's drivers -- SCD41, battery ADC, e-paper, LVGL, the button, the uart0 console, the
# UF2 output -- are not repeated here. They live in conf/airink_hw.conf, shared with the standalone
# firmware and pulled in by CMakeLists.txt. Below is only what this build decides differently.
#
# The one exception is the LVGL pool: it is a tuning knob, not a board fact, and this build cannot
# afford the standalone one's 48 KB.
# All views are built once and kept resident, and glyph draw buffers (b612_48 is ~2 KB) come out of
# the pool during a render. Running it dry is an MPU fault in lv_draw_label, not a graceful failure.
# Trimmed to the measured peak plus headroom -- ui::log_pool() reports "peak 17644 of 24576 B" at
# boot, with every view resident. If you raise the UI's appetite, read that line; do not guess.
CONFIG_LV_Z_MEM_POOL_SIZE=24576

# --- Stacks. RAM is what this build is short of; every kilobyte here is one the UI cannot have.
# main() no longer renders anything -- it only runs the CHIP task queue (AppTask::StartApp), and
# the 400x300 render with its 48 px glyph rasterisation moved to AirInk's own thread, which is
# sized for it in app_task.cpp. The sample's 6 KB was for a main that did the work.
CONFIG_MAIN_STACK_SIZE=3072
# The CHIP event loop. Our cluster writes take the stack lock from AirInk's thread rather than
# running here, so this carries Matter's own work only.
CONFIG_CHIP_TASK_STACK_SIZE=6144

# CHIP heap. The 10 KB default cannot build the NetworkCommissioning ScanNetworks
# response (cluster 0x0031 cmd 0x0000): the device returns NO_MEMORY ("Adding response
# failed: b"), the commissioner stalls, the fail-safe expires and the fabric is rolled
# back. Home Assistant issues ScanNetworks during commissioning (the phone framework does
# not, which is why that path used to get through). It looks like an obvious 8 KB to reclaim now
# that RAM is tight -- it is not.
CONFIG_CHIP_MALLOC_SYS_HEAP_SIZE=40960
