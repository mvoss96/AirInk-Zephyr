# The standalone firmware. Everything about the board -- drivers, console, UF2 output -- lives in
# conf/airink_hw.conf, which the Matter build pulls in as well. What is left here is what only
# this build gets to decide.

# All views (status bar + boot/sensor/error/low-battery/reset) are built once and kept resident,
# and glyph draw buffers (b612_48 is ~2 KB) are allocated from this pool during a render. 16 KB
# exhausts it -> lv_draw_buf_create_ex returns NULL -> MPU fault in lv_draw_label. The measured
# peak is ~19 KB (ui::log_pool reports it at boot); unlike the Matter build, this one has RAM to
# spare, so leave the headroom generous.
CONFIG_LV_Z_MEM_POOL_SIZE=49152

CONFIG_HEAP_MEM_POOL_SIZE=49152

# The full 400x300 mono render + big-font (b612_48/dseg7_48) rasterisation needs a roomy stack.
# Here the measurement loop IS main (apps/standalone/main.cpp -> app::run()), so main renders, and an overflow
# is an MPU fault whose symptom is "stuck on the boot screen". In the Matter build the loop has a
# thread of its own and main is trimmed right down.
CONFIG_MAIN_STACK_SIZE=8192
