# The silent build: the same firmware with its voice removed. Optional, opt-in on the command line,
# for either app:
#
#   west build -b promicro_nrf52840/nrf52840 apps/matter -d <dir> \
#       -- -Dmatter_EXTRA_CONF_FILE=<abs>/conf/release.conf
#
# (the `matter_` prefix is how sysbuild routes the variable to the image rather than to itself; the
# standalone build is not under sysbuild and takes a plain -DEXTRA_CONF_FILE=<abs>.)
#
# There are two things to give up here, and they are worth very different amounts.
#
# 1. The log lines themselves: about 7 uA (idle floor 55 instead of 62 uA -- PPK2, probe-corrected,
#    see docs/power-analysis.md). That is ~2 % of the 343 uA shipping average, and it is small on
#    purpose: the console used to cost ~650 uA, because an enabled UARTE holds the HFCLK on whether
#    or not anything is listening. CONFIG_PM_DEVICE_RUNTIME (conf/airink_hw.conf) now suspends the
#    peripheral between lines, so all that is left is the cost of the lines. Turning the logs off is
#    no longer how you get a low floor; it is the last microamps once you already have one.
#
# 2. Flash: 69 964 B in the Matter build (942 996 -> 873 032; 98.0 % of the code partition down to
#    90.7 %). That is the real reason this file exists -- it hands back the headroom the image had
#    run out of. But note where it comes from: dropping the same three console symbols from the
#    standalone build, which has no logging subsystem, saves only 1 516 B. So the flash is the log
#    strings and the logging subsystem, not the UART. And RAM barely moves either way: 192 B in the
#    Matter build, 128 B in the standalone one. This buys flash. It does not fix the RAM budget.
#
# So this is not a measurement build: measure the ordinary, talking firmware, that is the honest
# number. It is a release build, for an image where nobody is reading the console anyway.
#
# Nothing in the tree reaches for the console device by hand -- app.cpp used to, to power it down
# around its sleep, and that code is gone -- so dropping SERIAL only removes printk's backend. The
# devicetree keeps its zephyr,console chosen node; with no UART driver built, nothing binds it, and
# that is fine. printk() calls compile to nothing.
#
# Debugging a board flashed with this: there is no console, not even the Zephyr boot banner. Build
# without this fragment.

CONFIG_LOG=n

CONFIG_UART_CONSOLE=n
CONFIG_CONSOLE=n
CONFIG_SERIAL=n

# CONFIG_PRINTK=n alone does nothing: a `select` cannot be overridden by an assignment, and there
# are TWO boot banners that select it -- Zephyr's own, and NCS's on top of it. Both default to y.
# Neither has anywhere to print to once the console is gone.
CONFIG_BOOT_BANNER=n
CONFIG_NCS_BOOT_BANNER=n
CONFIG_PRINTK=n
