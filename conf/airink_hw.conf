# AirInk's hardware, shared by both builds: the standalone firmware and the Matter build.
# Both prj.conf files pull this in (see the EXTRA_CONF_FILE line in their CMakeLists.txt), so
# a driver that gets enabled here reaches both -- the same reason dts/airink_hw.dtsi exists.
#
# What belongs here: facts about the board. What does NOT: anything an app might legitimately
# want a different value for -- the LVGL pool, the stacks, the heaps. Those are tuning knobs and
# they differ (the Matter build is short of RAM in a way the standalone one is not), so they stay
# in each prj.conf. Keeping this file free of them is what makes the merge order irrelevant.

# Build the app as C++.
CONFIG_CPP=y
CONFIG_STD_CPP17=y

# GPIO for the LED (P0.15) and the button (P0.11).
CONFIG_GPIO=y

# The button, via the input subsystem. gpio-keys debounces and reports press/release; the
# input-longpress pseudo-device (in the .dtsi) splits that into a tap and a hold code, so
# button.cpp maps codes instead of timing the press itself. SYNCHRONOUS mode runs our callback in
# the reporting context rather than spending a 1 KB stack on a dedicated thread -- the callback
# only enqueues.
CONFIG_INPUT=y
CONFIG_INPUT_LONGPRESS=y
CONFIG_INPUT_MODE_SYNCHRONOUS=y

# SCD41 CO2/temperature/humidity on i2c0 (SCL P0.22 / SDA P0.24), single-shot mode.
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_SCD4X=y

# Battery sensing via SAADC: P0.31 external divider + the internal VDDH/5 path.
CONFIG_ADC=y

# The SoC's POWER peripheral, for its VBUS detection (USBDETECTED/USBREMOVED). It is what lets the
# charging bolt appear and clear the instant the cable moves, instead of on the next 30 s cycle --
# without polling for a change that happens twice a week. No USB stack is involved: the USBD
# peripheral stays off, and the interrupt vector is already owned by the clock driver, which
# dispatches to nrfx_power for us. See battery::watch_supply().
CONFIG_NRFX_POWER=y

# k_poll: the loop waits on the button AND the cable at the same time (src/app.cpp, wait()).
CONFIG_POLL=y

# External 3V3 LDO / load-switch on P0.13, kept on via regulator-boot-on. It feeds the sensor and
# the panel, so it must come up before their drivers do.
CONFIG_REGULATOR=y
CONFIG_REGULATOR_FIXED=y

# Device-level power management, and -- the part that matters -- runtime PM: each driver suspends
# its peripheral when it has nothing in flight and resumes it for the next transfer.
#
# This is what makes the console free. An enabled UARTE holds the HFCLK on, ~650 uA, whether or not
# anything is listening; the standalone firmware used to work around that by suspending the console
# by hand around its sleep, which the Matter build could not do because CHIP logs while we sleep.
# With runtime PM the driver does it per line, and the measured idle floor with full logging went
# from ~705 uA to ~62 uA. The hand-rolled suspend is gone.
#
# It only works because dts/airink_hw.dtsi puts i2c0 and spi2 back on TWIM/SPIM: the legacy TWI and
# SPI drivers the board DTS selects never call pm_device_runtime_get(), so they touch a suspended
# peripheral and assert. See docs/power-analysis.md.
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y

# --- E-Paper: GDEY042T81 4.2" (SSD1683) ---
# The in-tree ssd16xx driver has no SSD1683 support, so we build the vendored copy in
# src/drivers/ (it adds a solomon,ssd1683 quirk, max 400x400) and keep the in-tree one out.
CONFIG_SPI=y
CONFIG_MIPI_DBI=y
CONFIG_DISPLAY=y
CONFIG_SSD16XX=n

# --- LVGL: 1-bit, rendered on demand, never from a workqueue ---
CONFIG_LVGL=y
CONFIG_LV_COLOR_DEPTH_1=y
CONFIG_LV_Z_BITS_PER_PIXEL=1
CONFIG_LV_Z_COLOR_MONO_HW_INVERSION=y
# SSD16xx only does full-panel refresh; render the whole framebuffer each flush.
CONFIG_LV_Z_FULL_REFRESH=y
CONFIG_LV_Z_VDB_SIZE=100
CONFIG_LV_Z_AUTO_INIT=y
CONFIG_LV_Z_RUN_LVGL_ON_WORKQUEUE=n
# The UI uses custom B612 (text) + DSEG7 (values) fonts from src/fonts/, so no Montserrat is
# needed. LVGL still insists on a built-in default font -- used only by a widget that sets none,
# which never happens here -- so pick the tiny UNSCII-8 placeholder and force Montserrat out.
CONFIG_LV_FONT_DEFAULT_UNSCII_8=y
CONFIG_LV_FONT_MONTSERRAT_14=n
# Lets ui::log_pool() weigh the LVGL pool. Without a number, "48 KB should be enough" is a guess
# -- and running the pool dry is an MPU fault, not a graceful failure.
CONFIG_SYS_HEAP_RUNTIME_STATS=y
# The onboarding QR code (ui::show_pairing). lv_qrcode renders into an I1 draw buffer, which is
# this panel's own format. It is here rather than in the Matter app's prj.conf because the UI is
# shared source: whether a build shows a QR is decided by whether it has codes to show, not by a
# compile switch. A build with no radio never builds the view, so it pays only the library's flash
# -- a few KB, against 75 % free.
CONFIG_LV_USE_QRCODE=y

# --- Console on uart0 (remapped to P1.04/P1.06), not the board's USB CDC ACM default ---
# CDC keeps the USB peripheral powered. Turning the backend off also drops the USB device stack
# from the boot path -- but it removes the SERIAL/CONSOLE/UART_CONSOLE defaults with it, so those
# have to be set explicitly here.
CONFIG_BOARD_SERIAL_BACKEND_CDC_ACM=n
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Produce a .uf2 for the Adafruit nRF52 bootloader these SuperMini clones ship with. Build for the
# PLAIN target (promicro_nrf52840/nrf52840), NOT the /uf2 variant: the plain target links the app
# at 0x1000 (right after the MBR), which is where this bootloader expects a SoftDevice-less app.
# The /uf2 variant links at 0x26000 (SoftDevice layout) and will not boot here.
CONFIG_BUILD_OUTPUT_UF2=y
CONFIG_BUILD_OUTPUT_UF2_FAMILY_ID="0xada52840"
