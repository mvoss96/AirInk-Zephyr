SB_CONFIG_MATTER=y
SB_CONFIG_PARTITION_MANAGER=n

# No MCUboot: plain single image at 0x1000, flashed via the Adafruit UF2 bootloader
# (keeps AirInk's drag-drop field-update flow). Matter only imply's MCUboot, so this
# override is legal. Cost: no over-the-air OTA (would need external QSPI flash anyway).
SB_CONFIG_BOOTLOADER_NONE=y

# No factory-data partition for the bring-up (test/example DAC creds instead). The
# sample defaults this to y, which forces CONFIG_CHIP_FACTORY_DATA=y and a
# factory_data_partition DT node we don't have. Off here releases both.
SB_CONFIG_MATTER_FACTORY_DATA_GENERATE=n

# No over-the-air OTA (no MCUboot). This is what injects CONFIG_CHIP_OTA_REQUESTOR into
# the app image; off here drops the DFU image manager (IMG_MANAGER/DFU_TARGET/
# STREAM_FLASH) that needs slot0/slot1 partitions we don't have. Field updates are UF2.
SB_CONFIG_MATTER_OTA=n
