# Enable CHIP
CONFIG_CHIP=y
CONFIG_CHIP_PROJECT_CONFIG="src/chip_project_config.h"
CONFIG_CHIP_DEVICE_PRODUCT_NAME="Matter Temperature Sensor"

# Configure ZAP file name
CONFIG_NCS_SAMPLE_MATTER_ZAP_FILE_PATH="${APPLICATION_CONFIG_DIR}/src/default_zap/temperature_sensor.zap"

# Based on https://github.com/project-chip/connectedhomeip/blob/482e6fd03196a6de45465a90003947ef4b86e0b1/docs/examples/discussion/PID_allocation_for_example_apps.md)
CONFIG_CHIP_DEVICE_PRODUCT_ID=32781
CONFIG_STD_CPP17=y

# Enable Matter pairing automatically on application start.
CONFIG_CHIP_ENABLE_PAIRING_AUTOSTART=y

# Enable Matter extended announcement and increase duration to 1 hour.
CONFIG_CHIP_BLE_EXT_ADVERTISING=y
CONFIG_CHIP_BLE_ADVERTISING_DURATION=60

# Add support for LEDs and buttons on Nordic development kits
CONFIG_DK_LIBRARY=y

# Bluetooth Low Energy configuration
CONFIG_BT_DEVICE_NAME="MatterTemperature"
CONFIG_BT_DEVICE_NAME_MAX=18

# Suspend devices when the CPU goes into sleep
CONFIG_PM_DEVICE=y

# Other settings
CONFIG_THREAD_NAME=y
CONFIG_MPU_STACK_GUARD=y
CONFIG_RESET_ON_FATAL_ERROR=n
# Shell off for the bring-up (saves flash; RAM barely).
CONFIG_CHIP_LIB_SHELL=n

# Reduce application size
CONFIG_USE_SEGGER_RTT=n

# Bring-up: no factory-data partition. CHIP_FACTORY_DATA is select'd by the default
# provider choice (NRFCONNECT_BACKEND), so setting it =n is ignored -- pick the NONE
# member of the choice instead. Matter then uses the built-in TEST credentials
# (passcode 20202021, discriminator 3840). Single UF2 image, commissionable, no cert
# partition. Not for a shipped/certifiable device.
CONFIG_CHIP_FACTORY_DATA_NONE=y

# (OTA requestor is turned off at the sysbuild layer: SB_CONFIG_MATTER_OTA=n. It's
# injected via .config.sysbuild, which is merged AFTER prj.conf, so a prj.conf override
# here would be ignored -- the switch has to live in sysbuild.conf.)

# Matter has its own bootloader choice, separate from the sysbuild one, defaulting to
# CHIP_BOOTLOADER_MCUBOOT which hard-selects IMG_MANAGER (whose STREAM_FLASH dependency
# is now off). Pick NONE -- we have no MCUboot.
CONFIG_CHIP_BOOTLOADER_NONE=y

# NFC onboarding pulls in the NFC T2T nrfxlib, but the promicro board doesn't enable the
# nrfx NFCT driver (the DK does) -> undefined nrfx_nfct_* at link. We commission over BLE
# with the QR / manual code, so drop NFC onboarding.
CONFIG_CHIP_NFC_ONBOARDING_PAYLOAD=n

# SCD41 CO2/temp/humidity on i2c0 (board overlay). The app reads real temperature from it
# and publishes to the Matter TemperatureMeasurement cluster. This is the Stage-3 RAM gate:
# Matter + the sensor subsystem, still no LVGL.
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_SCD4X=y

# Console over uart0 (remapped to P1.04/P1.06 = COM9 in the board overlay) instead of the
# board's USB CDC default -- lets the SWD/PPK2 rig (no USB) read Matter's boot logs.
CONFIG_BOARD_SERIAL_BACKEND_CDC_ACM=n
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# Produce a .uf2 for the Adafruit nRF52 bootloader (drag-drop flashing, as AirInk today).
CONFIG_BUILD_OUTPUT_UF2=y
CONFIG_BUILD_OUTPUT_UF2_FAMILY_ID="0xada52840"

# Console over uart0 (the promicro default is USB CDC; AirInk remaps to P1.04, but for
# the bare bring-up leave the board default -- we only need the log to confirm boot).
